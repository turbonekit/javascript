<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Пенсионный калькулятор</title>
</head>
<body>
  <h1>Пенсионный калькулятор</h1>

  <form id="pensionForm">
    <p>
      <label>
        Возраст:
        <input type="number" id="age" name="age" required min="0" />
      </label>
    </p>

    <p>
      Пол:
      <label><input type="radio" name="gender" value="male" required /> Мужчина</label>
      <label><input type="radio" name="gender" value="female" /> Женщина</label>
    </p>

    <button type="submit">Рассчитать</button>
    <p>
      <textarea id="result" rows="4" cols="40" readonly></textarea>
    </p>
  </form>

  <script>
    'use strict';

    const form = document.getElementById('pensionForm');
    const ageInput = document.getElementById('age');
    const result = document.getElementById('result');

    form.addEventListener('submit', function (event) {
      event.preventDefault();

      const age = Number(ageInput.value);
      const gender = form.elements.gender.value;

      let message = 'Да кто ты такой?';

      if (age >= 0 && age <= 17) {
        message = 'Вам работать ещё рано — учитесь';
      } else if (
        (gender === 'male' && age >= 18 && age <= 59) ||
        (gender === 'female' && age >= 18 && age <= 54)
      ) {
        message = 'Вам ещё работать и работать';
      } else if (
        (gender === 'male' && age >= 60 && age <= 64) ||
        (gender === 'female' && age >= 55 && age <= 59)
      ) {
        message = 'Скоро пенсия!';
      } else if (
        (gender === 'male' && age >= 65) ||
        (gender === 'female' && age >= 60)
      ) {
        message = 'Вам пора на пенсию';
      }

      result.value = message;
    });
  </script>
</body>
</html>

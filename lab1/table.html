<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Таблица</title>
</head>
<body>
  <h1>Таблица</h1>

  <form id="tableForm">
    <p>
      <label>
        Количество строк:
        <input type="number" id="rows" required min="1" step="1" />
      </label>
    </p>
    <button type="submit">Рисовать</button>
  </form>

  <script>
    'use strict';

    const form = document.getElementById('tableForm');
    const rowsInput = document.getElementById('rows');
    const pattern = ['dog', 'dog', 'dog', 'cat', 'cat'];

    form.addEventListener('submit', function (event) {
      event.preventDefault();

      const rows = Math.trunc(Number(rowsInput.value));
      if (!Number.isFinite(rows) || rows < 1) return;

      for (let r = 0; r < rows; r++) {
        let line = [];
        for (let c = 0; c < 6; c++) {
          line.push(pattern[(r + c) % pattern.length]);
        }
        console.log(line.join('\t'));
      }
    });
  </script>
</body>
</html>

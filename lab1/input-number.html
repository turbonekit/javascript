<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ввод числа</title>
</head>
<body>
  <h1>Ввод числа</h1>
  <a href="index.html" id="numberLink">Получить число</a>

  <script>
    'use strict';

    const link = document.getElementById('numberLink');

    link.addEventListener('click', function (event) {
      let num;

      while (true) {
        const value = prompt('Введите число больше 100', '');
        if (value === null) {
          break;
        }
        num = Number(value);
        if (num > 100) {
          break;
        }
      }

      if (num > 100) {
        return;
      }

      event.preventDefault();
      if (!confirm('Вы действительно хотите перейти по ссылке?')) {
        event.preventDefault();
      }
    });
  </script>
</body>
</html>
